<!DOCTYPE html>
<html>
<head>
  <title>Weather App</title>
</head>
<body>

  <h1>Weather App 🌦️</h1>

  <input type="text" id="city" placeholder="Enter city name">
  <button onclick="showCity()">Search</button>

  <p id="result"></p>

  <script>
    function showCity() {
      let city = document.getElementById("city").value;
      document.getElementById("result").innerText =
        "You entered: " + city;
    }
  </script>

</body>
</html>
